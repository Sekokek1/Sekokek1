name: Generate Profile SVG

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' 

      - name: Run C# Generator
        run: dotnet run --project ./ProfileAnimator/ProfileAnimator.csproj

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          cp ./ProfileAnimator/animated-console.svg .
          cp ./ProfileAnimator/pacman.svg .
          git add animated-console.svg pacman.svg
          git commit -m "Автоматическое обновление SVG анимаций" || echo "Нет изменений для коммита"
          git push
